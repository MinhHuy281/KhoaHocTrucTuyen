{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'course.css' %}">
{% endblock %}

{% block content %}

<div class="lesson-page">

<h1>{{lesson.title}}</h1>

<div class="video">

<iframe
width="800"
height="450"
src="{{lesson.video}}"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="lesson-content">

{{lesson.content}}

</div>

</div>

{% endblock %}
