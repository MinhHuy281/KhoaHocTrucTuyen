{% extends "base.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'course.css' %}">
{% endblock %}

{% block content %}

<div class="lesson-page">

<h1>{{lesson.title}}</h1>

<div class="video">

    <p>ID: {{ video_id }}</p>  <!-- 👈 THÊM DÒNG NÀY -->

    <iframe 
    width="100%" 
    height="500"
    src="https://www.youtube.com/embed/{{ video_id }}"
    allowfullscreen>
</iframe>

<p>
    ❌ Nếu không xem được:
    <a href="https://www.youtube.com/watch?v={{ video_id }}" target="_blank">
        Xem trên YouTube
    </a>
</p>

</div>

<div class="lesson-content">

{{lesson.content}}

</div>

</div>

{% endblock %}
