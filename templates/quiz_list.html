{% extends "base.html" %}
{% block content %}
<h2>Bài tập ôn luyện - {{ course.title }}</h2>
{% for quiz in quizzes %}
    <div class="card mb-3">
        <div class="card-body">
            <h5>{{ quiz.title }}</h5>
            <p>Thời gian: {{ quiz.minutes }} phút</p>
            <a href="{% url 'start_quiz' quiz.id %}" class="btn btn-primary">Bắt đầu làm bài</a>
        </div>
    </div>
{% empty %}
    <p>Chưa có bài tập nào cho khóa học này.</p>
{% endfor %}
{% endblock %}
