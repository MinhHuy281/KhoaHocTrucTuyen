{% extends "base.html" %}
{% load static %}

{% block title %}Xác nhận mã{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-title">Xác nhận mã</div>
        <p class="auth-subtitle">Bước 2/3: Nhập mã đã gửi tới email: <strong>{{ email }}</strong></p>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="text" name="code" placeholder="Nhập mã 6 chữ số" class="auth-input" maxlength="6" pattern="\d{6}" required>
            <div class="password-rule">Kiểm tra Email và Nhập mã xác thực.</div>
            <button type="submit" class="auth-btn">Xác nhận</button>
        </form>

        <div class="auth-link">
            <a href="{% url 'password_reset' %}">Gửi lại mã khác</a>
        </div>
    </div>
</div>
{% endblock %}
